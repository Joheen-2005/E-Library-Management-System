{% extends "base.html" %}
{% block title %}Reset Password — E-Library{% endblock %}

{% block extra_css %}
<style>
  .auth-wrap {
    min-height: calc(100vh - var(--topbar-h) - 56px);
    display: flex; align-items: center; justify-content: center;
    padding: 40px 16px;
  }
  .auth-card {
    width: 100%; max-width: 420px;
    background: var(--bg-card);
    border: 1px solid var(--border-color);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-lg);
    overflow: hidden;
    animation: scaleIn 0.4s ease both;
  }
  @keyframes scaleIn {
    from { opacity: 0; transform: scale(0.96) translateY(16px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }
  .auth-header {
    background: var(--brand-dark);
    padding: 32px 32px 28px; text-align: center;
  }
  .auth-header .icon { font-size: 2.5rem; margin-bottom: 12px; }
  .auth-header h2 { color: var(--brand-gold); font-size: 1.4rem; font-weight: 700; }
  .auth-header p  { color: rgba(255,255,255,0.5); font-size: 0.82rem; margin-top: 6px; }
  .auth-body { padding: 32px; }
  .input-icon-wrap { position: relative; }
  .input-icon-wrap .form-control { padding-left: 40px; }
  .input-icon-wrap .icon-left {
    position: absolute; left: 13px; top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted); font-size: 0.85rem; pointer-events: none;
  }
  .captcha-box {
    background: white;
    border: 1.5px solid var(--brand-gold);
    border-radius: var(--radius-sm);
    padding: 14px;
    text-align: center;
    font-size: 1.6rem;
    font-weight: 800;
    letter-spacing: 10px;
    color: var(--brand-dark);
    margin-bottom: 10px;
    font-family: 'Courier New', monospace;
    user-select: none;
  }
  .auth-footer {
    padding: 16px 32px 24px; text-align: center;
    font-size: 0.83rem; color: var(--text-muted);
    border-top: 1px solid var(--border-color);
  }
  .auth-footer a { color: var(--brand-mid); font-weight: 600; }
</style>
{% endblock %}

{% block content %}
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-header">
      <div class="icon">🔑</div>
      <h2>Reset Password</h2>
      <p>Enter your email and choose a new password</p>
    </div>

    <div class="auth-body">
      <form action="{{ url_for('auth.forgot_password') }}" method="POST"
            onsubmit="return validateCaptcha()" autocomplete="off">

        <div class="form-group">
          <label class="form-label">Email Address</label>
          <div class="input-icon-wrap">
            <i class="fas fa-envelope icon-left"></i>
            <input class="form-control" type="email" name="email" placeholder="your@email.com" required />
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">New Password</label>
          <div class="input-icon-wrap">
            <i class="fas fa-lock icon-left"></i>
            <input class="form-control" type="password" name="newpassword" placeholder="Min 6 characters" required />
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Confirm Password</label>
          <div class="input-icon-wrap">
            <i class="fas fa-lock icon-left"></i>
            <input class="form-control" type="password" name="confirmpassword" placeholder="Repeat password" required />
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Enter CAPTCHA</label>
          <div class="captcha-box" id="captchaBox"></div>
          <input class="form-control" type="text" id="captchaInput"
                 placeholder="Type the characters above" required autocomplete="off" />
          <p id="captchaMsg" style="font-size:0.78rem;margin-top:6px;min-height:18px"></p>
        </div>

        <button type="submit" class="btn btn-primary"
                style="width:100%;justify-content:center;padding:12px;">
          <i class="fas fa-key"></i> Reset Password
        </button>
      </form>
    </div>

    <div class="auth-footer">
      Remembered it? <a href="{{ url_for('auth.login') }}">Back to Login</a>
    </div>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
const CAPTCHA_LEN = 5;
let generatedCaptcha = '';

function generateCaptcha() {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  const box = document.getElementById('captchaBox');
  generatedCaptcha = '';
  box.innerHTML = '';
  for (let i = 0; i < CAPTCHA_LEN; i++) {
    const ch = chars[Math.floor(Math.random() * chars.length)];
    generatedCaptcha += ch;
    const span = document.createElement('span');
    span.textContent = ch;
    const hue = Math.floor(Math.random() * 40) + 10;
    span.style.cssText = `color:hsl(${hue},60%,30%);display:inline-block;
      transform:rotate(${(Math.random()-0.5)*20}deg);`;
    box.appendChild(span);
  }
}

function validateCaptcha() {
  const val = document.getElementById('captchaInput').value.trim().toUpperCase();
  const msg = document.getElementById('captchaMsg');
  if (val === generatedCaptcha) {
    msg.style.color = '#2d6a4f';
    msg.textContent = '✓ CAPTCHA verified';
    return true;
  }
  msg.style.color = '#c0392b';
  msg.textContent = '✗ Incorrect — try again';
  generateCaptcha();
  document.getElementById('captchaInput').value = '';
  return false;
}

window.addEventListener('DOMContentLoaded', generateCaptcha);
</script>
{% endblock %}

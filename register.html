{% extends "base.html" %}
{% block title %}Register — E-Library{% endblock %}

{% block extra_css %}
<style>
  .auth-wrap {
    min-height: calc(100vh - var(--topbar-h) - 56px);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 16px;
  }

  .auth-card {
    width: 100%;
    max-width: 460px;
    background: var(--bg-card);
    border: 1px solid var(--border-color);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-lg);
    overflow: hidden;
    animation: scaleIn 0.4s ease both;
  }

  @keyframes scaleIn {
    from {
      opacity: 0;
      transform: scale(0.96) translateY(16px);
    }

    to {
      opacity: 1;
      transform: scale(1) translateY(0);
    }
  }

  .auth-header {
    background: var(--brand-dark);
    padding: 28px 32px 24px;
    text-align: center;
  }

  .auth-header .icon {
    font-size: 2rem;
    margin-bottom: 10px;
  }

  .auth-header h2 {
    color: var(--brand-gold);
    font-size: 1.3rem;
    font-weight: 700;
  }

  .auth-header p {
    color: rgba(255, 255, 255, 0.5);
    font-size: 0.8rem;
    margin-top: 4px;
  }

  .auth-body {
    padding: 28px 32px;
  }

  .input-icon-wrap {
    position: relative;
  }

  .input-icon-wrap .form-control {
    padding-left: 40px;
  }

  .input-icon-wrap .icon-left {
    position: absolute;
    left: 13px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    font-size: 0.85rem;
    pointer-events: none;
  }

  .two-col {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }

  .auth-footer {
    padding: 14px 32px 22px;
    text-align: center;
    font-size: 0.83rem;
    color: var(--text-muted);
    border-top: 1px solid var(--border-color);
  }

  .auth-footer a {
    color: var(--brand-mid);
    font-weight: 600;
  }

  .auth-footer a:hover {
    text-decoration: underline;
  }

  .password-strength {
    height: 4px;
    border-radius: 2px;
    background: var(--border-color);
    margin-top: 6px;
    overflow: hidden;
  }

  .strength-bar {
    height: 100%;
    border-radius: 2px;
    transition: width 0.3s, background 0.3s;
    width: 0;
  }
</style>
{% endblock %}

{% block content %}
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-header">
      <div class="icon"><img src="{{ url_for('static', filename='images/register.jpg') }}" alt="Logo" height="130px"
          width="200px"></div>
      <h2>Create Account</h2>
      <p>Join the E-Library community</p>
    </div>

    <div class="auth-body">
      <form action="{{ url_for('auth.register') }}" method="POST" autocomplete="off">

        <div class="form-group">
          <label class="form-label">Full Name</label>
          <div class="input-icon-wrap">
            <i class="fas fa-id-card icon-left"></i>
            <input class="form-control" type="text" name="fullname" placeholder="Your full name" required />
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Email Address</label>
          <div class="input-icon-wrap">
            <i class="fas fa-envelope icon-left"></i>
            <input class="form-control" type="email" name="email" placeholder="your@email.com" required />
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Username</label>
          <div class="input-icon-wrap">
            <i class="fas fa-user icon-left"></i>
            <input class="form-control" type="text" name="username" placeholder="Choose a username" required />
          </div>
        </div>

        <div class="two-col">
          <div class="form-group">
            <label class="form-label">Password</label>
            <div class="input-icon-wrap">
              <i class="fas fa-lock icon-left"></i>
              <input class="form-control" type="password" name="password" id="pwdField" placeholder="Min 6 chars"
                required oninput="checkStrength(this.value)" />
            </div>
            <div class="password-strength">
              <div class="strength-bar" id="strengthBar"></div>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">Confirm Password</label>
            <div class="input-icon-wrap">
              <i class="fas fa-lock icon-left"></i>
              <input class="form-control" type="password" name="confirm" placeholder="Repeat password" required />
            </div>
          </div>
        </div>

        <button type="submit" class="btn btn-primary"
          style="width:100%;justify-content:center;padding:12px;margin-top:4px;">
          <i class="fas fa-user-plus"></i> Create Account
        </button>
      </form>
    </div>

    <div class="auth-footer">
      Already have an account? <a href="{{ url_for('auth.login') }}">Sign in</a>
    </div>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
  function checkStrength(val) {
    const bar = document.getElementById('strengthBar');
    let score = 0;
    if (val.length >= 6) score += 25;
    if (val.length >= 10) score += 25;
    if (/[A-Z]/.test(val)) score += 25;
    if (/[0-9!@#$]/.test(val)) score += 25;
    bar.style.width = score + '%';
    if (score <= 25) bar.style.background = '#c0392b';
    else if (score <= 50) bar.style.background = '#d68910';
    else if (score <= 75) bar.style.background = '#f39c12';
    else bar.style.background = '#2d6a4f';
  }
</script>
{% endblock %}

{% extends "base.html" %}
{% block title %}Login — E-Library{% endblock %}

{% block extra_css %}
<style>
  .auth-wrap {
    min-height: calc(100vh - var(--topbar-h) - 56px);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 16px;
  }

  .auth-card {
    width: 100%;
    max-width: 420px;
    background: var(--bg-card);
    border: 1px solid var(--border-color);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-lg);
    overflow: hidden;
    animation: scaleIn 0.4s ease both;
  }

  @keyframes scaleIn {
    from {
      opacity: 0;
      transform: scale(0.96) translateY(16px);
    }

    to {
      opacity: 1;
      transform: scale(1) translateY(0);
    }
  }

  .auth-header {
    background: var(--brand-dark);
    padding: 32px 32px 28px;
    text-align: center;
  }

  .auth-header .icon {
    font-size: 2.5rem;
    margin-bottom: 12px;
  }

  .auth-header h2 {
    color: var(--brand-gold);
    font-size: 1.4rem;
    font-weight: 700;
  }

  .auth-header p {
    color: rgba(255, 255, 255, 0.5);
    font-size: 0.82rem;
    margin-top: 6px;
  }

  .auth-body {
    padding: 32px;
  }

  .input-icon-wrap {
    position: relative;
  }

  .input-icon-wrap .form-control {
    padding-left: 40px;
  }

  .input-icon-wrap .icon-left {
    position: absolute;
    left: 13px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    font-size: 0.85rem;
    pointer-events: none;
  }

  .forgot-link {
    display: block;
    text-align: right;
    font-size: 0.78rem;
    color: var(--brand-mid);
    margin-top: -10px;
    margin-bottom: 18px;
  }

  .forgot-link:hover {
    text-decoration: underline;
  }

  .auth-footer {
    padding: 16px 32px 24px;
    text-align: center;
    font-size: 0.83rem;
    color: var(--text-muted);
    border-top: 1px solid var(--border-color);
  }

  .auth-footer a {
    color: var(--brand-mid);
    font-weight: 600;
  }

  .auth-footer a:hover {
    text-decoration: underline;
  }
</style>
{% endblock %}

{% block content %}
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-header">
      <div class="icon"><img src="{{ url_for('static', filename='images/liblogin.jpg') }}" alt="Logo" height="100px"
          width="100px"></div>
      <h2>Welcome Back</h2>
      <p>Sign in to your library account</p>
    </div>

    <div class="auth-body">
      <form action="{{ url_for('auth.login') }}" method="POST" autocomplete="off">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() if csrf_token is defined else '' }}" />

        <div class="form-group">
          <label class="form-label">Username</label>
          <div class="input-icon-wrap">
            <i class="fas fa-user icon-left"></i>
            <input class="form-control" type="text" name="username" placeholder="Enter your username" required />
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Password</label>
          <div class="input-icon-wrap">
            <i class="fas fa-lock icon-left"></i>
            <input class="form-control" type="password" name="password" id="passwordField"
              placeholder="Enter your password" required />
          </div>
        </div>

        <a href="{{ url_for('auth.forgot_password') }}" class="forgot-link">Forgot password?</a>

        <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:12px;">
          <i class="fas fa-sign-in-alt"></i> Sign In
        </button>
      </form>
    </div>

    <div class="auth-footer">
      Don't have an account? <a href="{{ url_for('auth.register') }}">Register here</a>
    </div>
  </div>
</div>
{% endblock %}
